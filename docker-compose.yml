version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-bi-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_bi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 测试用 MySQL 数据库（电商示例数据）
  mysql-test:
    image: mysql:8.0
    container_name: ai-bi-mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: testroot123
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass123
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
      - ./scripts/mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptestroot123"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  mysqldata:
